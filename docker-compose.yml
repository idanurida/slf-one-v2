services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slf_one
      POSTGRES_USER: slf_user
      POSTGRES_PASSWORD: slf_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slf_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:5000:5000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "127.0.0.1:3300:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
